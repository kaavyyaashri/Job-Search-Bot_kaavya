name: India Jobs — Daily 8AM IST

on:
  schedule:
    - cron: '30 2 * * *'        # 8 AM IST = 02:30 UTC
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install python-jobspy groq scikit-learn numpy python-dateutil pyyaml pytz

      - name: Run pipeline
        env:
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          EMAIL_ADDRESS:      ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          EMAIL_TO:           ${{ secrets.EMAIL_TO }}
        run: python src/main.py --country India
