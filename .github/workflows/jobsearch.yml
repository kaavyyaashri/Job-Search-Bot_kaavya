name: Daily Job Search Bot

on:
  workflow_dispatch:   # Manual trigger anytime from GitHub

  schedule:
    # ── USA — 8 AM CST (14:00 UTC) ──────────────────────
    - cron: "0 14 * * 1-5"

    # ── India — 8 AM IST (02:30 UTC) ────────────────────
    - cron: "30 2 * * 1-5"

    # ── Singapore — 8 AM SGT (00:00 UTC) ────────────────
    - cron: "0 0 * * 1-5"

jobs:
  # ── USA ─────────────────────────────────────────────────
  usa-job-search:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 14 * * 1-5'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install google-generativeai requests
      - name: Run USA job search
        env:
          TARGET_COUNTRY:     "usa"
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          EMAIL_ADDRESS:      ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          EMAIL_TO:           ${{ secrets.EMAIL_TO }}
        run: python job_search_automate.py

  # ── India ────────────────────────────────────────────────
  india-job-search:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '30 2 * * 1-5'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install google-generativeai requests
      - name: Run India job search
        env:
          TARGET_COUNTRY:     "india"
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          EMAIL_ADDRESS:      ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          EMAIL_TO:           ${{ secrets.EMAIL_TO }}
        run: python job_search_automate.py

  # ── Singapore ────────────────────────────────────────────
  singapore-job-search:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 0 * * 1-5'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install google-generativeai requests
      - name: Run Singapore job search
        env:
          TARGET_COUNTRY:     "singapore"
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          EMAIL_ADDRESS:      ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          EMAIL_TO:           ${{ secrets.EMAIL_TO }}
        run: python job_search_automate_1.py
