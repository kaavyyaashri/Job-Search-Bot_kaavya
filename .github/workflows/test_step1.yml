name: Test Step 1 — Config & Skeleton

on:
  workflow_dispatch:        # ← Manual trigger button in GitHub UI
    inputs:
      country:
        description: 'Country to test (USA / India / Singapore)'
        required: true
        default: 'USA'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run pipeline skeleton
        run: python src/main.py --country ${{ github.event.inputs.country }}

