name: Keepalive

on:
  schedule:
    - cron: '0 12 */2 * *'    # every 2 days at noon UTC
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    permissions:
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Keep workflows alive
        uses: gautamkrishnar/keepalive-workflow@v2
