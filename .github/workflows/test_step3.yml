name: Test Step 3 — JSearch Scraper

on:
  workflow_dispatch:
    inputs:
      country:
        description: 'Country to test (USA / India / Singapore)'
        required: true
        default: 'USA'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pyyaml python-dateutil

      - name: Test JSearch scraper
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: python src/test_scrapers.py --country ${{ github.event.inputs.country }}
```

---

