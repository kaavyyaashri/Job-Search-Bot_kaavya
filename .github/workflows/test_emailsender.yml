name: Test Step 5 — Email Sender

on:
  workflow_dispatch:
    inputs:
      country:
        description: 'Country label in email (USA / India / Singapore)'
        required: true
        default: 'USA'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pytz

      - name: Send test email
        env:
          GMAIL_USER:        ${{ secrets.EMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL:   ${{ secrets.EMAIL_TO }}
        run: python src/test_email.py --country ${{ github.event.inputs.country }}
