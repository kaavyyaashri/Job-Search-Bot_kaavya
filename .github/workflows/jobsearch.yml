# for emailing and searching
name: Daily Job Search Bot

on:
  workflow_dispatch:  # Manual trigger from GitHub anytime

  schedule:
    # ── USA — 8 AM CST (runs 3x to catch RSS refresh cycles) ──
    - cron: "0 14 * * 1-5"   # 8:00 AM CST
    - cron: "0 18 * * 1-5"   # 12:00 PM CST
    - cron: "0 23 * * 1-5"   # 5:00 PM CST

    # ── India — 8 AM IST ──
    - cron: "30 2 * * 1-5"   # 8:00 AM IST

    # ── Singapore — 8 AM SGT ──
    - cron: "0 0 * * 1-5"    # 8:00 AM SGT

    # ── Ireland — 8 AM GMT ──
    - cron: "0 8 * * 1-5"    # 8:00 AM GMT

jobs:
  run-job-search:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install anthropic requests python-docx

      - name: Run job search bot
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python job_search_automate.py
# ```

# ---

# ## Step 3: Add Your GitHub Secrets

# Go to your GitHub repo → **Settings** → **Secrets and variables** → **Actions** → **New repository secret** and add these 4:

# | Secret Name | What to put |
# |---|---|
# | `ANTHROPIC_API_KEY` | Your key from console.anthropic.com |
# | `EMAIL_ADDRESS` | Gmail you'll send FROM (e.g. `mybot@gmail.com`) |
# | `EMAIL_APP_PASSWORD` | Gmail App Password (see below) |
# | `EMAIL_TO` | Your personal email to receive the digest |

# ### Getting a Gmail App Password (takes 2 mins):
# 1. Go to **myaccount.google.com** → Security
# 2. Enable **2-Step Verification** if not already on
# 3. Search "App Passwords" → Create one → Name it "Job Bot"
# 4. Copy the 16-character password → paste as `EMAIL_APP_PASSWORD` secret

# ---

